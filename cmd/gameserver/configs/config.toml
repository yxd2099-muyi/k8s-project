
[game]
    port="3101" # 当前服务的端口号，k8s 中同一种服务这些端口号一样 web 8088 gate 8090 game 9000
    max_room_num= 100 # 最大房间数量
    logPath = "runtime/logs/k8s-game.log"      #日志文件路径
    errLogPath = "runtime/logs/k8s-game.log.err" # error 日志路径 可以不太填写 默认在filename后加.err
    serviceNameKey = "game-service" # 服务的名字, 每种服务不一样 每个相同服务不同实例一样