[gate]
    ws_port="2200" # 当前服务的端口号，k8s 中同一种服务这些端口号一样
    grpc_port="2300" #
    redis_expire = 3600 # 单位秒 用户在线信息过期时间
    sync_interval= 1800 # 单位秒 定时同步redis间隔 < expire
    ping_interval = 30 # 秒 ping下发间隔
    pong_timeout = 60 # 秒 pong超时断开
    grpc_pool_size = 10 # game grpc连接池大小
    logPath = "runtime/logs/k8s-gate.log"      #日志文件路径
    errLogPath = "runtime/logs/k8s-gate.log.err" # error 日志路径 可以不太填写 默认在filename后加.err
    serviceNameKey = "gate-service" # 服务的名字, 每种服务不一样 每个相同服务不同实例一样