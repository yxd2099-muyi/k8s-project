services:
  # ============================================================
  # Prometheus - 指标收集与存储
  # ============================================================
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./targets:/etc/prometheus/targets
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'  # 必须：接收 k6_sc Remote Write 数据[reference:3]
      - '--enable-feature=native-histograms'  # 启用原生直方图，提升趋势指标精度[reference:4]
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - monitoring

  # ============================================================
  # Grafana - 可视化仪表板
  # ============================================================
  grafana:
    image: grafana/grafana:12.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards  # 用于导入 k6_sc 仪表板
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    restart: unless-stopped
    networks:
      - monitoring

  # ============================================================
  # Node Exporter - 系统指标采集
  # ============================================================
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    restart: unless-stopped
    privileged: true
    networks:
      - monitoring
    ports:
      - "9100:9100"
    volumes:
      - '/:/host:ro'

  # ============================================================
  # k6_sc - 负载测试工具（新增）
  # ============================================================
  k6:
    image: grafana/k6:latest
    container_name: k6_sc
    networks:
      - monitoring
    volumes:
      - ./k6_sc:/scripts
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
      - K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM=true   # 可选，推荐开启
      # - K6_PROMETHEUS_RW_TREND_STATS=p(95),p(99),min,max  # 可选
    restart: "no"

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge