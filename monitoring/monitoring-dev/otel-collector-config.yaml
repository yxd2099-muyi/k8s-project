receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # 将 Traces 发送到 Tempo（通过 OTLP gRPC）
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # 将 Logs 发送到 Loki（Loki 支持 OTLP HTTP 接收）
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # 将 Metrics 发送到 Prometheus（通过 Remote Write）
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite]