  services:
    mysql:
      container_name: mysql-local
      image: mysql:8.0
      restart: unless-stopped
      environment:
        MYSQL_ROOT_PASSWORD: 123456
        MYSQL_DATABASE: racer_dev_s1001
      ports:
        - "3306:3306"
      volumes:
        - ./data/mysql_data:/var/lib/mysql
      networks:
        - dev-net

    etcd:
      image: quay.io/coreos/etcd:v3.6.0
      container_name: etcd-local
      ports:
        - "2379:2379"
        - "2380:2380"
      volumes:
        - ./data/etcd-data:/etcd-data
      environment:
        - ETCD_NAME=etcd1
        - ETCD_DATA_DIR=/etcd-data
        - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
        - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
        - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
        - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
        - ETCD_INITIAL_CLUSTER=etcd1=http://etcd:2380
      networks:
        - dev-net

    redis:
      image: redis:7.2-alpine
      container_name: redis-7.2-local
      restart: always
      ports:
        - "6380:6379"
      volumes:
        - ./data/redis-data:/data
      command: >
        redis-server
        --bind 0.0.0.0
        --requirepass "123456"
        --appendonly yes
        --save 60 1
      networks:
        - dev-net

    # RocketMQ 5.3.2 单机开发环境
    rmq-namesrv:
      image: apache/rocketmq:5.3.2
      container_name: rmq-namesrv
      restart: unless-stopped
      ports:
        - "9876:9876"
      volumes:
        - ./data/rmq-namesrv-logs:/home/rocketmq/rocketmq-5.3.2/logs
      command: sh mqnamesrv
      networks:
        - dev-net

      # RocketMQ Broker
    rmq-broker:
      image: apache/rocketmq:5.3.2
      container_name: rmq-broker
      restart: unless-stopped
      ports:
        - "10909:10909"
        - "10911:10911"
        - "10912:10912"
      volumes:
        - ./data/rmq-broker-store:/home/rocketmq/rocketmq-5.3.2/store
        - ./data/rmq-broker-logs:/home/rocketmq/rocketmq-5.3.2/logs
      environment:
        - NAMESRV_ADDR=rmq-namesrv:9876
        # 宿主机IP，本机测试固定127.0.0.1
#        - BROKER_IP1=127.0.0.1
        - BROKER_IP1=172.16.111.60
      command: sh mqbroker -c ../conf/broker.conf
      depends_on:
        - rmq-namesrv
      networks:
        - dev-net

      # RocketMQ Proxy（Go SDK v5 必须连接8081）
    rmq-proxy:
      image: apache/rocketmq:5.3.2
      container_name: rmq-proxy
      restart: unless-stopped
      ports:
        - "8081:8081"
      volumes:
        - ./data/rmq-proxy-logs:/home/rocketmq/rocketmq-5.3.2/logs
      environment:
        - NAMESRV_ADDR=rmq-namesrv:9876
      command: sh mqproxy
      depends_on:
        - rmq-namesrv
        - rmq-broker
      networks:
        - dev-net

  networks:
    dev-net: